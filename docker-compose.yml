# Solo el delivery service. NO incluye infra.
#   docker compose up -d --build

# Red externa: la crea el stack de nmarsollier. Debe existir antes de levantar delivery.
networks:
  ecommerce:
    external: true
    name: ecommerce

services:
  delivery:
    build: .
    container_name: delivery-service
    ports:
      - "3005:3005"
    environment:
      PORT: "3005"
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/delivery_service
      MONGODB_DB_NAME: delivery_service
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: shipping_events
      AUTH_SERVICE_URL: http://auth:3000
      ORDERS_SERVICE_URL: http://orders:3004
    networks:
      - ecommerce

