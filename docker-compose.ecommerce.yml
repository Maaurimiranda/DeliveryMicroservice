# Stack completo: infra (Mongo, RabbitMQ, Redis, Fluent) + microservicios Go.

services:
  mongo:
    image: mongo:6.0
    container_name: ec-mongo
    # El healthcheck (mongosh cada 10s) abre un pool de ~5 conexiones y cada una loguea
    # "client metadata", inundando Docker Desktop. --quiet corta los accepted/ended; --logpath
    # manda TODO el log de mongod a un archivo dentro del contenedor, dejando el stdout (lo que
    # ve Docker Desktop) limpio. Para leer logs de mongo: docker exec ec-mongo cat /var/log/mongod.log
    command: ["mongod", "--quiet", "--logpath", "/var/log/mongod.log", "--logappend"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ecommerce
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13.6-management
    container_name: ec-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    networks:
      - ecommerce
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: ec-redis
    ports:
      - "6379:6379"
    networks:
      - ecommerce

  fluent:
    image: fluent
    container_name: fluent
    ports:
      - "24224:24224"
    networks:
      - ecommerce

  auth:
    image: prod-auth-go
    container_name: prod-auth-go
    ports:
      - "3000:3000"
      - "4000:4000"
    environment:
      MONGO_URL: mongodb://mongo:27017
      RABBIT_URL: amqp://rabbitmq
      REDIS_URL: redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce

  image:
    image: prod-image-go
    container_name: prod-image-go
    ports:
      - "3001:3001"
      - "4001:4001"
    environment:
      MONGO_URL: mongodb://mongo:27017
      RABBIT_URL: amqp://rabbitmq
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce

  catalog:
    image: prod-cataloggo-go
    container_name: prod-cataloggo-go
    ports:
      - "3002:3002"
      - "4002:4002"
    environment:
      MONGO_URL: mongodb://mongo:27017
      RABBIT_URL: amqp://rabbitmq
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce

  cart:
    image: prod-cartgo-go
    container_name: prod-cartgo-go
    ports:
      - "3003:3003"
      - "4003:4003"
    environment:
      MONGO_URL: mongodb://mongo:27017
      RABBIT_URL: amqp://rabbitmq
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce

  orders:
    image: prod-orders-go
    container_name: prod-orders-go
    ports:
      - "3004:3004"
      - "4004:4004"
    environment:
      MONGO_URL: mongodb://mongo:27017
      RABBIT_URL: amqp://rabbitmq
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce

# La red que comparte todo el ecosistema. El delivery (docker-compose.yml) la usa como externa.
networks:
  ecommerce:
    name: ecommerce

volumes:
  mongo-data:
